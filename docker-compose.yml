services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: reactquiz
      JWT_SECRET: ${JWT_SECRET:-dev_change_me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-pete@nexgenstemschool.com.au}
      ADMIN_BOOTSTRAP_KEY: ${ADMIN_BOOTSTRAP_KEY:-dev_only_admin_key}
      FEEDBACK_EMAIL_ADDRESS: ${FEEDBACK_EMAIL_ADDRESS:-feedback@example.com}
      SMTP_URL: ${SMTP_URL:-}
      SMTP_FROM: ${SMTP_FROM:-Hooked on React <no-reply@example.com>}
      PORT: 8787
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "8787:8787"
    depends_on:
      - mongo

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8787
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  mongo_data:
